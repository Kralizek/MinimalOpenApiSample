$schema: "https://spec.openapis.org/oas/3.1/schema/2022-10-07"
openapi: 3.1.0
info:
  title: Bookstore API
  version: 1.0.0
components:
  schemas:
    Book:
      type: object
      required:
        - id
        - title
        - author
        - price
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          minLength: 1
          maxLength: 200
        author:
          type: string
          minLength: 1
          maxLength: 100
        price:
          type: number
          minimum: 0
        isbn:
          type: string
          pattern: '^[0-9X-]{10,17}$'
        categories:
          type: array
          items:
            $ref: '#/components/schemas/Category'
    Category:
      type: string
      enum: [fiction, non-fiction, sci-fi, fantasy]
paths:
  /books:
    get:
      operationId: searchBooks
      tags:
        - Books
      summary: Get a list of books
      parameters:
        - name: query
          in: query
          required: false
          schema:
            type: string
            minLength: 2
            maxLength: 100
          description: Free text search term
        - name: author
          in: query
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 100
          description: Filter by author name
        - name: category
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/Category'
          description: Filter by book category
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number for pagination
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
          description: Number of items per page
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                required:
                  - totalCount
                  - items
                properties:
                  totalCount:
                    type: integer
                    minimum: 0
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Book'
    post:
      summary: Create a new book
      operationId: createBook
      tags:
        - Books
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - author
                - price
              properties:
                title:
                  type: string
                  minLength: 1
                  maxLength: 200
                author:
                  type: string
                  minLength: 1
                  maxLength: 100
                price:
                  type: number
                  minimum: 0
                isbn:
                  type: string
                  pattern: '^[0-9X-]{10,17}$'
                categories:
                  type: array
                  items:
                    $ref: '#/components/schemas/Category'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
  /books/{id}:
    get:
      summary: Get a book by ID
      operationId: getBookById
      tags:
        - Books
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Unique identifier for the book
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        '404':
          description: Book not found
    put:
      summary: Update a book by ID
      operationId: updateBookById
      tags:
        - Books
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Unique identifier for the book
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  minLength: 1
                  maxLength: 200
                author:
                  type: string
                  minLength: 1
                  maxLength: 100
                price:
                  type: number
                  minimum: 0
                isbn:
                  type: string
                  pattern: '^[0-9X-]{10,17}$'
                categories:
                  type: array
                  items:
                    $ref: '#/components/schemas/Category'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        '404':
          description: Book not found
    delete:
      summary: Delete a book by ID
      operationId: deleteBookById
      tags:
        - Books
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Unique identifier for the book
      responses:
        '204':
          description: Book deleted successfully
        '404':
          description: Book not found
  /categories:
    get:
      summary: Get a list of book categories
      operationId: listCategories
      tags:
        - Categories
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
  /authors:
    get:
      summary: Get a list of authors
      operationId: listAuthors
      tags:
        - Authors
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string